<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" fill="none">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .title { font-size: 13px; font-weight: 600; fill: #e5e7eb; letter-spacing: 0.05em; }
      .label { font-size: 11px; font-weight: 500; fill: #d1d5db; }
      .sublabel { font-size: 9.5px; fill: #9ca3af; }
      .spec { font-size: 9px; fill: #6b7280; font-family: 'SF Mono', 'Fira Code', monospace; }
      .arrow { stroke: #4b5563; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4b5563"/>
    </marker>
  </defs>

  <rect width="1100" height="620" rx="12" fill="#0d1117"/>
  <rect width="1100" height="620" rx="12" fill="none" stroke="#21262d"/>

  <text x="550" y="36" text-anchor="middle" class="title" fill="#a855f7" style="font-size:15px; letter-spacing:0.15em;">SENTIO INTELLIGENCE PIPELINE</text>
  <text x="550" y="52" text-anchor="middle" class="spec">Film Analysis → Emotion Classification → Narrative Orchestration → Subsystem Commands</text>

  <!-- Row 1: Input -->
  <rect x="30" y="80" width="160" height="90" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="110" y="102" text-anchor="middle" class="title">VIDEO</text>
  <text x="110" y="122" text-anchor="middle" class="sublabel">Frame decode</text>
  <text x="110" y="140" text-anchor="middle" class="sublabel">240 fps input</text>
  <text x="110" y="160" text-anchor="middle" class="spec">sentio.analyzer</text>

  <rect x="210" y="80" width="160" height="90" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="290" y="102" text-anchor="middle" class="title">AUDIO</text>
  <text x="290" y="122" text-anchor="middle" class="sublabel">Mel spectrogram</text>
  <text x="290" y="140" text-anchor="middle" class="sublabel">48 kHz multichannel</text>
  <text x="290" y="160" text-anchor="middle" class="spec">sentio.analyzer</text>

  <rect x="390" y="80" width="160" height="90" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="470" y="102" text-anchor="middle" class="title">NARRATIVE</text>
  <text x="470" y="122" text-anchor="middle" class="sublabel">Scene boundaries</text>
  <text x="470" y="140" text-anchor="middle" class="sublabel">Act structure · Beats</text>
  <text x="470" y="160" text-anchor="middle" class="spec">sentio.analyzer</text>

  <!-- Arrows to Transformer -->
  <path d="M 110 170 L 110 210 L 440 210 L 440 230" class="arrow"/>
  <path d="M 290 170 L 290 210 L 500 210 L 500 230" class="arrow"/>
  <path d="M 470 170 L 470 210 L 560 210 L 560 230" class="arrow"/>

  <!-- Row 2: NarrativeTransformer -->
  <rect x="350" y="230" width="310" height="100" rx="8" fill="#161b22" stroke="#a855f7" stroke-width="2"/>
  <text x="505" y="254" text-anchor="middle" class="title" fill="#a855f7">NARRATIVE TRANSFORMER</text>
  <line x1="370" y1="264" x2="640" y2="264" stroke="#30363d" stroke-width="0.5"/>
  <text x="505" y="284" text-anchor="middle" class="label">Multi-modal Fusion + Transformer Encoder</text>
  <text x="505" y="302" text-anchor="middle" class="sublabel">1.5T parameters · 50+ PFLOPS (Zhilicon)</text>
  <text x="505" y="320" text-anchor="middle" class="spec">sentio.models</text>

  <!-- Row 3: Classification outputs -->
  <path d="M 440 330 L 440 360 L 240 360 L 240 380" class="arrow"/>
  <path d="M 560 330 L 560 360 L 760 360 L 760 380" class="arrow"/>

  <rect x="130" y="380" width="220" height="80" rx="8" fill="#161b22" stroke="#c084fc"/>
  <text x="240" y="402" text-anchor="middle" class="title" fill="#c084fc">EMOTION CLASSIFIER</text>
  <line x1="150" y1="412" x2="330" y2="412" stroke="#30363d" stroke-width="0.5"/>
  <text x="240" y="432" text-anchor="middle" class="sublabel">6 dimensions · 98.7% accuracy</text>
  <text x="240" y="448" text-anchor="middle" class="spec">sentio.emotion</text>

  <rect x="650" y="380" width="220" height="80" rx="8" fill="#161b22" stroke="#c084fc"/>
  <text x="760" y="402" text-anchor="middle" class="title" fill="#c084fc">ARC TRACKER</text>
  <line x1="670" y1="412" x2="850" y2="412" stroke="#30363d" stroke-width="0.5"/>
  <text x="760" y="432" text-anchor="middle" class="sublabel">Temporal smoothing · Trend detection</text>
  <text x="760" y="448" text-anchor="middle" class="spec">sentio.emotion</text>

  <!-- Arrows to Orchestrator -->
  <path d="M 240 460 L 240 490 L 450 490 L 450 500" class="arrow"/>
  <path d="M 760 460 L 760 490 L 560 490 L 560 500" class="arrow"/>

  <!-- Row 4: Orchestrator -->
  <rect x="370" y="500" width="270" height="50" rx="8" fill="#161b22" stroke="#a855f7" stroke-width="1.5"/>
  <text x="505" y="522" text-anchor="middle" class="title" fill="#a855f7">ORCHESTRATION ENGINE</text>
  <text x="505" y="540" text-anchor="middle" class="sublabel">&lt; 10 ms decision latency · Real-time dispatch</text>

  <!-- Output subsystems -->
  <path d="M 420 550 L 160 570 L 160 575" class="arrow"/>
  <path d="M 460 550 L 380 575" class="arrow"/>
  <path d="M 540 550 L 620 575" class="arrow"/>
  <path d="M 580 550 L 840 570 L 840 575" class="arrow"/>

  <rect x="110" y="575" width="100" height="30" rx="6" fill="#f59e0b"/>
  <text x="160" y="595" text-anchor="middle" style="font-size:10px; font-weight:600; fill:#000;">SPECTRA</text>

  <rect x="330" y="575" width="100" height="30" rx="6" fill="#06b6d4"/>
  <text x="380" y="595" text-anchor="middle" style="font-size:10px; font-weight:600; fill:#000;">SONORA</text>

  <rect x="570" y="575" width="100" height="30" rx="6" fill="#64748b"/>
  <text x="620" y="595" text-anchor="middle" style="font-size:10px; font-weight:600; fill:#fff;">STRATUM</text>

  <rect x="790" y="575" width="100" height="30" rx="6" fill="#ef4444"/>
  <text x="840" y="595" text-anchor="middle" style="font-size:10px; font-weight:600; fill:#fff;">HAPTICS</text>

  <!-- Specs panel (right side) -->
  <rect x="890" y="80" width="180" height="240" rx="8" fill="#161b22" stroke="#21262d"/>
  <text x="980" y="104" text-anchor="middle" class="title" fill="#a855f7">SPECIFICATIONS</text>
  <line x1="910" y1="114" x2="1050" y2="114" stroke="#30363d" stroke-width="0.5"/>
  <text x="920" y="140" class="label">Processing</text>
  <text x="920" y="158" class="sublabel">50+ PFLOPS</text>
  <text x="920" y="184" class="label">Parameters</text>
  <text x="920" y="202" class="sublabel">1.5 Trillion</text>
  <text x="920" y="228" class="label">Accuracy</text>
  <text x="920" y="246" class="sublabel">98.7% emotion</text>
  <text x="920" y="272" class="label">Latency</text>
  <text x="920" y="290" class="sublabel">&lt; 10 ms end-to-end</text>
</svg>
